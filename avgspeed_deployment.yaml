apiVersion: apps/v1
kind: Deployment
metadata:
  name: avgspeed-app
  labels:
    app: avgspeed-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: avgspeed-app
  template:
    metadata:
      labels:
        app: avgspeed-app
    spec:
      containers:
        - name: tripcost-app
          image: hyoneekim/tripcost-app:latest # need to change to my own image
          imagePullPolicy: Never   # use Never for local images
          env:
            - name: DISPLAY
              value: "host.minikube.internal:0.0"
            - name: JAVA_TOOL_OPTIONS
              value: "-Dprism.order=sw"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"